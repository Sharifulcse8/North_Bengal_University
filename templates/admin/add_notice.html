{% extends "base.html" %}

{% block title %}Add Notice | Admin{% endblock %}

{% block content %}

<section class="bg-primary text-white text-center py-5">
    <div class="container">
        <h1><i class="fas fa-plus-circle"></i> Add New Notice</h1>
        <p class="lead">Publish a new announcement or news</p>
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="fas fa-edit"></i> Notice Form</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST" enctype="multipart/form-data">
                            
                            <div class="mb-3">
                                <label class="form-label">Title <span class="text-danger">*</span></label>
                                <input type="text" name="title" class="form-control" placeholder="Enter notice title" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select name="category" class="form-select">
                                    <option value="General">📌 General</option>
                                    <option value="Admission">🎓 Admission</option>
                                    <option value="Exam">📝 Exam</option>
                                    <option value="Event">🎉 Event</option>
                                    <option value="Scholarship">💰 Scholarship</option>
                                    <option value="Seminar">🎤 Seminar</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Short Description</label>
                                <textarea name="short_desc" class="form-control" rows="2" 
                                          placeholder="Brief summary (will appear in notice cards)"></textarea>
                                <small class="text-muted">If left empty, first 150 characters of content will be used.</small>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Content <span class="text-danger">*</span></label>
                                <textarea name="content" class="form-control" rows="8" 
                                          placeholder="Write full article here. Use <br> for new lines." required></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Featured Image</label>
                                <input type="file" name="image" class="form-control" accept="image/*">
                            </div>
                            
                            <hr>
                            
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-save"></i> Publish Notice
                                </button>
                                <a href="{{ url_for('admin_notices') }}" class="btn btn-secondary">
                                    <i class="fas fa-times"></i> Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
