{% extends "base.html" %}

{% block title %}{{ news.title }} | North Bengal University{% endblock %}

{% block content %}

<section class="bg-primary text-white text-center py-5">
    <div class="container">
        <h1>{{ news.title }}</h1>
        <p>Published on: {{ news.date }}</p>
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow">
                    <div class="card-body">
                        <h4>{{ news.title }}</h4>
                        <p>{{ news.content }}</p>
                        <hr>
                        <p><strong>Published:</strong> {{ news.date }}</p>
                        <a href="{{ url_for('news') }}" class="btn btn-primary">Back to News</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
